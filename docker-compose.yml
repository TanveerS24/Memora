version: '3.8'

services:
  memora-base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: memora-base:latest
    profiles:
      - base
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: memora-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - memora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memora"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Database
  chroma:
    image: chromadb/chroma:latest
    container_name: memora-chroma
    ports:
      - "5000:5000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - memora-network
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
      - ANONYMIZED_TELEMETRY=False

  # Redis for session storage
  redis:
    image: redis:7-alpine
    container_name: memora-redis
    ports:
      - "6379:6379"
    networks:
      - memora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama LLM Service (using local Ollama at http://localhost:11434)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: memora-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - memora-network
  #   environment:
  #     - OLLAMA_KEEP_ALIVE=-1
  #   command: >
  #     sh -c "
  #     ollama serve &
  #     sleep 10 &&
  #     ollama pull llama3.1:8b &&
  #     ollama pull nomic-embed-text &&
  #     tail -f /dev/null
  #     "

  # Gateway Service
  gateway-service:
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
    container_name: memora-gateway
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - PARTNER_SERVICE_URL=${PARTNER_SERVICE_URL}
      - CHAT_SERVICE_URL=${CHAT_SERVICE_URL}
      - MEMORY_SERVICE_URL=${MEMORY_SERVICE_URL}
      - RAG_SERVICE_URL=${RAG_SERVICE_URL}
      - MEDIA_SERVICE_URL=${MEDIA_SERVICE_URL}
      - INSIGHT_SERVICE_URL=${INSIGHT_SERVICE_URL}
      - SCHEDULER_SERVICE_URL=${SCHEDULER_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - POSTGRES_URL=${POSTGRES_URL}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      partner-service:
        condition: service_started
      chat-service:
        condition: service_started
      memory-service:
        condition: service_started
      rag-service:
        condition: service_started
      media-service:
        condition: service_started
      insight-service:
        condition: service_started
      scheduler-service:
        condition: service_started
    networks:
      - memora-network

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: memora-auth
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_PORT=${AUTH_PORT}
      - SESSION_SECRET=${SESSION_SECRET}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - memora-network

  # Partner Service
  partner-service:
    build:
      context: ./services/partner-service
      dockerfile: Dockerfile
    container_name: memora-partner
    ports:
      - "8002:8002"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_PORT=${PARTNER_PORT}
      - SESSION_SECRET=${SESSION_SECRET}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - memora-network

  # Chat Service
  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: memora-chat
    ports:
      - "8003:8003"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RAG_SERVICE_URL=${RAG_SERVICE_URL}
      - SERVICE_PORT=${CHAT_PORT}
      - SESSION_SECRET=${SESSION_SECRET}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      partner-service:
        condition: service_started
      rag-service:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - memora-network

  # Memory Service
  memory-service:
    build:
      context: ./services/memory-service
      dockerfile: Dockerfile
    container_name: memora-memory
    ports:
      - "8004:8004"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - CHROMA_URL=${CHROMA_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MEDIA_SERVICE_URL=${MEDIA_SERVICE_URL}
      - SERVICE_PORT=${MEMORY_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      partner-service:
        condition: service_started
      chroma:
        condition: service_started
      media-service:
        condition: service_started
    networks:
      - memora-network

  # RAG Service
  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    container_name: memora-rag
    ports:
      - "8005:8005"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - CHROMA_URL=${CHROMA_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_PORT=${RAG_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      partner-service:
        condition: service_started
      chroma:
        condition: service_started
    networks:
      - memora-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Media Service
  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    container_name: memora-media
    ports:
      - "8006:8006"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_PORT=${MEDIA_PORT}
      - MEDIA_STORAGE_PATH=${MEDIA_STORAGE_PATH}
    volumes:
      - media_storage:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      partner-service:
        condition: service_started
    networks:
      - memora-network

  # Insight Service
  insight-service:
    build:
      context: ./services/insight-service
      dockerfile: Dockerfile
    container_name: memora-insight
    ports:
      - "8007:8007"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_PORT=${INSIGHT_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      partner-service:
        condition: service_started
    networks:
      - memora-network

  # Scheduler Service
  scheduler-service:
    build:
      context: ./services/scheduler-service
      dockerfile: Dockerfile
    container_name: memora-scheduler
    ports:
      - "8008:8008"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MEMORY_SERVICE_URL=${MEMORY_SERVICE_URL}
      - SERVICE_PORT=${SCHEDULER_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      partner-service:
        condition: service_started
      memory-service:
        condition: service_started
    networks:
      - memora-network

volumes:
  postgres_data:
  chroma_data:
  media_storage:

networks:
  memora-network:
    driver: bridge
